<div class="content flex">
    <div class="content-area
    h-full w-full lg:w-9/10 p-4 lg:p-0 lg:pt-24 lg:pl-28
    flex flex-col gap-8">
        <h1 class="font-eczar 
        whitespace-normal wrap-break-word
        font-bold text-[2rem]/[2rem] sm:text-[2.5rem]/[2.5rem] lg:text-[4rem]/[4rem]"
        >{{ 'references.title' | translate }}</h1>
        <div class="ref-area
        w-full flex-1
        flex justify-center items-center">
            <div class="ref-container
            w-full md:w-2/3">
                <div class="reference
                w-full rounded-sm p-4 lg:p-8
                flex flex-col gap-4">
                    <header class="flex justify-between items-center">
                        <h2 class="py-2 width-auto text-[1.5rem]/[1.5rem] sm:text-[2rem]/[2rem] font-bold
                        flex"
                        >{{ reference.fullName }}</h2>
                        <img src="assets/img/01_hero/flower.png"
                        class="hover-flower size-12 opacity-0"
                        [class.hover-flower-hover]="desktop()">
                    </header>
                    <p class="hyphens-auto sm:text-[1.5rem]/[2rem]">{{ `references.${reference.name}` | translate }}</p>
                    <p class="font-bold sm:text-[2rem]/[2rem]">{{ reference.position }}</p>
                </div>
            </div>
        </div>
    </div>
    @if(desktop()) {
        <section-selector class="w-1/10
        flex justify-center items-center"
        [index]="4"></section-selector>
    }
</div>
