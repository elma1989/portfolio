<div class="content flex">
    <div class="content-area
    w-full h-full lg:w-9/10 min-h-0 
    p-4 lg:p-0 lg:pl-28
    flex flex-col gap-4 lg:gap-8
    md:items-center">
        <header class="w-full lg:h-28
        flex flex-col gap-4 lg:gap-8 lg:flex-row lg:items-center">
            <h1 class="font-eczar 
            text-[1.5rem]/[1.5rem] md:text-[3rem]/[3rem] xl:text-[4.5rem]/[4.5rem]"
            >{{ 'projects.title' | translate }}</h1>
            <p class="lg:px-8 lg:flex-1 
            xl:text-[1.5rem]/[1.5rem]">{{ 'projects.desc' | translate }}</p>
        </header>
        <div class="w-full flex-1 min-h-0 max-w-175 lg:max-w-none
        flex items-center">
            <div class="projects-area w-full
            flex flex-col items-center justify-center lg:flex-row gap-4 lg:gap-8">
                <div class="preview-wrapper w-full lg:w-2/5
                flex flex-col items-center">
                    <div class="preview rounded-sm aspect-16/9 md:aspect-square 
                    bg-{{ projects[index()].background }}
                    h-[13dvh] min-[390px]:h-[25dvh] max-h-100 md:h-auto md:w-full
                    px-4 lg:px-8 2xl:py-8 relative
                    flex justify-center items-center">
                        <img src="assets/img/04_projects/flower-{{ projects[index()].flower }}.png" 
                        class="flower size-16 md:size-24 lg:size-36
                        absolute bottom-0 left-0">
                        <img src="assets/img/04_projects/{{ projects[index()].screenschot }}.png" 
                        class="screenshot rounded-sm
                        aspect-4/3 w-full h-full z-1
                        object-contain object-center">
                    </div>
                </div>
                <div class="details-area
                w-full max-w-150 lg:w-3/5 lg:h-full
                flex flex-col items-center">
                    <project-board class="bg-cblack tx-white rounded-sm relative
                    w-full max-w-88 md:max-w-none p-4 lg:p-8
                    flex flex-col gap-4 lg:gap-8"
                    [project]="projects[index()]"></project-board>
                    <nav class="w-full max-w-88 md:max-w-none py-4
                    flex justify-between gap-4
                    font-bold xl:text-[1.5rem]/[1.5rem]">
                        <div class="prev w-1/2
                        flex justify-start gap-2 items-center">
                            <span>&lt;&lt;</span>
                            <button class="inline-block text-left w-32"
                            (click)="prev()">{{ 'projects.prev' | translate }}</button>
                        </div>
                        <div class="right w-2/5
                        flex justify-end gap-2 items-center">
                            <button class="inline-block text-right w-32"
                            (click)="next()">{{ 'projects.next' | translate }}</button>
                            <span>&gt;&gt;</span>
                        </div>
                    </nav>
                </div>
            </div>
        </div>
    </div>
    @if(!mobile()) {
        <section-selector class="w-1/10 h-full
        flex justify-center items-center"
        [index]="3"></section-selector>
    }
</div>
